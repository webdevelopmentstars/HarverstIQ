version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: harvestiq-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: harvestiq
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u admin -p password --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harvestiq
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: harvestiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ""
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harvestiq
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: harvestiq-api
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongo:27017/harvestiq?authSource=admin}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_super_secret_refresh_key_change_in_production_min_32_chars}
      API_PORT: ${API_PORT:-4000}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3000,http://web:3000}
      SCRAPER_SECRET: ${SCRAPER_SECRET:-your_scraper_shared_secret_min_32_chars}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src
    healthcheck:
      test: curl -f http://localhost:4000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - harvestiq
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: harvestiq-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    healthcheck:
      test: curl -f http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - harvestiq
    restart: unless-stopped

  scraper:
    build:
      context: ./apps/scraper
      dockerfile: Dockerfile
    container_name: harvestiq-scraper
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongo:27017/harvestiq?authSource=admin}
      API_BASE_URL: ${API_BASE_URL:-http://api:4000}
      SCRAPER_SECRET: ${SCRAPER_SECRET:-your_scraper_shared_secret_min_32_chars}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-./config/service-account.json}
      MAX_BROWSERS: ${MAX_BROWSERS:-5}
      DEFAULT_DELAY_MIN: ${DEFAULT_DELAY_MIN:-1}
      DEFAULT_DELAY_MAX: ${DEFAULT_DELAY_MAX:-5}
      PYTHON_ENV: ${PYTHON_ENV:-development}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./apps/scraper:/app
      - ./config/service-account.json:/app/config/service-account.json:ro
    networks:
      - harvestiq
    restart: unless-stopped

networks:
  harvestiq:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
